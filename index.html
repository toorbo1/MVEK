<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Бесконечный Семестр</title>
<style>

  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
  html { scroll-behavior: smooth; }

  body {
    background: #19191c;
    min-height: 100vh;
  }

  /* Телефон: на всю ширину экрана */
  .page {
    width: 100%;
    max-width: 100%;
    margin: 0 auto;
  }

  .page img {
    width: 100%;
    display: block;
  }

  @media (min-width: 600px) {
    .page {
      max-width: 650px;
      box-shadow:
        -60px 0 80px 40px rgba(0,0,0,0.85),
         60px 0 80px 40px rgba(0,0,0,0.85);
    }
  }

  @media (min-width: 900px) {
    .page { max-width: 800px; }
  }

  @media (min-width: 1200px) {
    .page { max-width: 950px; }
  }

  /* Шапка залипает сверху */
  .header-wrap {
    position: sticky;
    top: 0;
    z-index: 999;
    background: #19191c;
  }

  .header-inner { position: relative; }

  /* Прозрачные кнопки поверх шапки */
  .nav-link {
    position: absolute;
    top: 0; bottom: 0;
    cursor: pointer;
    text-decoration: none;
  }
  .nav-link.about { left: 0;  width: 28%; }
  .nav-link.team  { right: 0; width: 31%; }

</style>
</head>
<body>

<div class="page">

  <!-- №1 ШАПКА -->
  <div class="header-wrap">
    <div class="header-inner">
      <img src="header.png" alt="Шапка">
      <a href="#about" class="nav-link about" aria-label="Об игре"></a>
      <a href="#team"  class="nav-link team"  aria-label="Наша команда"></a>
    </div>
  </div>

  <!-- №2 ГЕРОЙ -->
  <img src="hero.png" alt="Бесконечный Семестр">

  <!-- №3 CTA -->
  <div id="about">
    <img src="cta.png" alt="Скачать">
  </div>

  <!-- №4 ГЕЙМПЛЕЙ -->
  <img src="gameplay.png" alt="Геймплей">

  <!-- №5 КОМАНДА -->
  <div id="team">
    <img src="team.png" alt="Прайм Левел">
  </div>

  <!-- №6 ФУТЕР -->
  <img src="footer.png" alt="Футер">

</div>

</body>
</html>
