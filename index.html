<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Бесконечный Семестр</title>
<style>

  /* ─── СБРОС ─────────────────────────────────────── */
  *, *::before, *::after {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }
  html {
    scroll-behavior: smooth;
  }

  /* ─── ФОНОВЫЙ ЦВЕТ СТРАНИЦЫ (тёмный, как дизайн) ── */
  body {
    background: #19191c;
    min-height: 100vh;
  }

  /* ─── ЦЕНТРАЛЬНАЯ КОЛОНКА ──────────────────────── */
  /*  Мобиль  < 480px  : 100% ширины                  */
  /*  Планшет 480–900px : до 520px, по центру          */
  /*  Десктоп > 900px   : до 600px, по центру          */
  .page {
    width: 100%;
    max-width: 520px;
    margin: 0 auto;
  }

  /* ─── ВСЕ БЛОКИ — КАРТИНКИ НА ВСИЮ ШИРИНУ КОЛОНКИ */
  .page img {
    width: 100%;
    display: block;
    /* Чёткость при масштабировании */
    image-rendering: -webkit-optimize-contrast;
    image-rendering: crisp-edges;
  }

  /* ─── ШАПКА ЗАЛИПАЕТ СВЕРХУ ─────────────────────── */
  .header-wrap {
    position: sticky;
    top: 0;
    z-index: 999;
    background: #19191c; /* подложка на крупных экранах */
  }

  /* ─── ПРОЗРАЧНЫЕ КНОПКИ ПОВЕРХ ШАПКИ ───────────── */
  .header-inner {
    position: relative;
  }
  .nav-link {
    position: absolute;
    top: 0;
    bottom: 0;
    cursor: pointer;
    text-decoration: none;
    /* Делаем зоны чуть больше для удобного тапа */
    padding: 4px 0;
  }
  /* «Об игре»  ≈ левые 28% шапки */
  .nav-link.about { left: 0;   width: 28%; }
  /* «Наша команда» ≈ правые 31% шапки */
  .nav-link.team  { right: 0;  width: 31%; }

  /* ─── ПЛАНШЕТ : немного шире ────────────────────── */
  @media (min-width: 521px) {
    .page {
      max-width: 580px;
    }
  }

  /* ─── ДЕСКТОП : ещё шире, боковые поля оформляем ── */
  @media (min-width: 769px) {
    .page {
      max-width: 640px;
      /* Лёгкая тень — отделяет контент от фона */
      box-shadow: 0 0 60px rgba(0,0,0,0.6);
    }
  }

  /* ─── ШИРОКИЙ ДЕСКТОП ────────────────────────────── */
  @media (min-width: 1200px) {
    .page {
      max-width: 680px;
    }
  }

</style>
</head>
<body>

<div class="page">

  <!-- ══ №1 ШАПКА ══════════════════════════════════ -->
  <div class="header-wrap">
    <div class="header-inner">
      <img src="Шапка (header) №1.png" alt="Шапка">
      <!-- Кнопка «Об игре» → секция #about -->
      <a href="#about" class="nav-link about" aria-label="Об игре"></a>
      <!-- Кнопка «Наша команда» → секция #team -->
      <a href="#team"  class="nav-link team"  aria-label="Наша команда"></a>
    </div>
  </div>

  <!-- ══ №2 ГЕРОЙ ═══════════════════════════════════ -->
  <img src="Контент №2.png" alt="Бесконечный Семестр — Сессия никогда не заканчивается">

  <!-- ══ №3 CTA / СКАЧАТЬ  (якорь «Об игре») ═══════ -->
  <div id="about">
    <img src="Контент (1) №3.png" alt="Скачать игру">
  </div>

  <!-- ══ №4 ГЕЙМПЛЕЙ ═══════════════════════════════ -->
  <img src="примеры №4.png" alt="Геймплей — Управляй грифоном">

  <!-- ══ №5 КОМАНДА  (якорь «Наша команда») ════════ -->
  <div id="team">
    <img src="Контент (4) №5.png" alt="Прайм Левел — Наша команда">
  </div>

  <!-- ══ №6 ФУТЕР ═══════════════════════════════════ -->
  <img src="Подвал (footer) №6.png" alt="Подвал">

</div>

</body>
</html>
